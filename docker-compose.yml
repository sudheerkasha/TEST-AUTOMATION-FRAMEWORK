version: '3.8'

services:

  # ── Selenium Hub ─────────────────────────────────────
  selenium-hub:
    image: selenium/hub:4.21.0
    container_name: selenium-hub
    ports:
      - "4444:4444"
      - "4442:4442"
      - "4443:4443"
    environment:
      - SE_SESSION_TIMEOUT=300
      - SE_SESSION_REQUEST_TIMEOUT=120

  # ── Chrome Nodes (Parallel Execution) ────────────────
  chrome-node-1:
    image: selenium/node-chrome:4.21.0
    container_name: chrome-node-1
    shm_size: 2gb
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=1
      - SE_NODE_OVERRIDE_MAX_SESSIONS=true

  chrome-node-2:
    image: selenium/node-chrome:4.21.0
    container_name: chrome-node-2
    shm_size: 2gb
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=1
      - SE_NODE_OVERRIDE_MAX_SESSIONS=true

  chrome-node-3:
    image: selenium/node-chrome:4.21.0
    container_name: chrome-node-3
    shm_size: 2gb
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=1
      - SE_NODE_OVERRIDE_MAX_SESSIONS=true

  # ── TEST EXECUTION CONTAINER (IMPORTANT) ─────────────
  tests:
    image: python:3.10
    container_name: test-runner
    depends_on:
      - selenium-hub
      - chrome-node-1
      - chrome-node-2
      - chrome-node-3
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - BASE_URL=https://react-frontend-api-testing.vercel.app
      - BROWSER=chrome
      - HEADLESS=true
      - EXECUTION_MODE=remote
      - GRID_URL=http://selenium-hub:4444/wd/hub
      - ADMIN_EMAIL=admin@example.com
      - ADMIN_PASSWORD=Admin@123
      - USER_EMAIL=user@example.com
      - USER_PASSWORD=User@123
      - DEFAULT_WAIT=10
    command: >
      bash -c "
      pip install --no-cache-dir -r requirements.txt &&
      pytest -n 3 --dist=loadscope
      --alluredir=reports/allure-results
      --junitxml=reports/junit.xml
      -v
      "
