[pytest]
# ── Test discovery ────────────────────────────────────────────────────────────
testpaths    = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── Output ────────────────────────────────────────────────────────────────────
# -v         verbose: shows each test name
# -s         show print/log output live (useful during development)
# --tb=short  concise traceback on failures
addopts =
    -v
    --tb=short
    --alluredir=reports/allure-results
    --junitxml=reports/junit.xml

# ── Logging ───────────────────────────────────────────────────────────────────
log_cli       = true
log_cli_level = INFO
log_format    = %(asctime)s | %(levelname)-8s | %(name)s | %(message)s
log_date_format = %H:%M:%S

# ── Markers ───────────────────────────────────────────────────────────────────
markers =
    smoke:    fast sanity checks
    regression: full regression suite
    auth:     authentication tests
    access:   access control tests
    projects: project and task tests
    browser:  browser interaction tests (alerts, frames, windows)
